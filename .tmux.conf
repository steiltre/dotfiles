# Remap prefix
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Vim-like split commands
bind-key v split-window -h
bind-key s split-window -v

# Vim-like pane movement
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

# Reload tmux config
bind-key r source-file ~/.tmux.conf

# Resize panes
bind-key -r < resize-pane -L 5
bind-key -r > resize-pane -R 5
bind-key -r + resize-pane -U 5
bind-key -r _ resize-pane -D 5
bind-key = select-layout even-vertical
bind-key | select-layout even-horizontal

# Use vim-style key bindings in command-line mode
set-option -g status-keys vi

# Use vim-style key-bindings in copy mode
set-option -g mode-keys vi

#### COLOUR (Solarized 256)

# default statusbar colors
#set-option -g status-bg colour235 #base02
#set-option -g status-fg colour136 #yellow
set-option -g status-bg white
set-option -g status-fg colour160
set-option -g status-attr default

# default window title colors
set-window-option -g window-status-fg colour244 #base0
set-window-option -g window-status-bg default
set-window-option -g window-status-attr dim

# active window title colors
set-window-option -g window-status-current-fg colour160
set-window-option -g window-status-current-bg default
set-window-option -g window-status-current-attr bright

# pane border
set-option -g pane-border-fg colour240
set-option -g pane-active-border-fg colour166 #base01

# message text
set-option -g message-bg colour235 #base02
set-option -g message-fg colour166 #orange

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green

# bell
set-window-option -g window-status-bell-style fg=colour235,bg=colour160 #base02, red
